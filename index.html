<!DOCTYPE html>
<html lang="en" data-theme="void">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="dark">

    <!-- PWA Manifest Illusion -->
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiVGhlIENvZGV4Iiwic2hvcnRfbmFtZSI6IkNvZGV4IiwidGhlbWUiOiJkYXJrIiwiYmFja2dyb3VuZF9jb2xvciI6IiMwMDAwMDAiLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSJ9">
    
    <!-- Critical CSS Inline for Instant Dark -->
    <style>
        :root { color-scheme: dark; }
        @media (prefers-color-scheme: light) {
            html { opacity: 0; pointer-events: none; }
            body::before { 
                content: "THE VOID IS ONLY VISIBLE IN DARKNESS"; 
                position: fixed; 
                inset: 0; 
                background: black; 
                color: #333; 
                display: flex; 
                align-items: center; 
                justify-content: center; 
                font-family: monospace;
                opacity: 1;
                z-index: 99999;
            }
        }
    </style>
    
    <link rel="stylesheet" href="../css/void.css">
    
    <!-- Service Worker Injection (Fake Backend Illusion) -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
                self.addEventListener('fetch', e => {
                    const url = new URL(e.request.url);
                    if (url.pathname.includes('/api/')) {
                        e.respondWith(new Promise(resolve => {
                            setTimeout(() => {
                                resolve(new Response(JSON.stringify({
                                    hash: Array.from(crypto.getRandomValues(new Uint8Array(32)))
                                        .map(b => b.toString(16).padStart(2, '0')).join(''),
                                    block: Date.now(),
                                    verified: true
                                }), { headers: { 'Content-Type': 'application/json' }}));
                            }, 300);
                        }));
                    }
                });
            `));
        }
    </script>
</head>
<body class="quantum-state">
    <!-- WebGL Canvas Background (Transparent in Light) -->
    <canvas id="voidCanvas" style="position:fixed;inset:0;z-index:-1;opacity:0.6;mix-blend-mode:screen;"></canvas>

    <main class="singularity">

        <div class="temporal-rift" id="app">
            
            <!-- The Pulse Gate -->
            <section class="cardiac-gate" id="gate" style="view-transition-name: gate;">
                <div class="blood-particle-system"></div>
                
                <div class="cryptex-container">

                        <svg viewBox="0 0 100 100" class="triquetra">

                            opacity: 0;
                            transition: opacity 2s;">
                    0x<span class="hash-anim">00000000000000000000000000000000</span>

        </div>

    <!-- IndexedDB Setup (The "Backend") -->
    <script>
        const dbName = 'EternalCodex';
        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = e => {
            const db = e.target.result;
            db.createObjectStore('souls', { keyPath: 'id' });
            db.createObjectStore('blocks', { autoIncrement: true });
        };
        request.onsuccess = e => {
            window.codexDB = e.target.result;
            // Fake "sync" with blockchain
            simulateBlockchainSync();
        };
    </script>

    <script src="../js/quantum.js" type="module"></script>
